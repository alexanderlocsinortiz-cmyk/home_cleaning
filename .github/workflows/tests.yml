name: Code Quality & Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cleanflow_test
          POSTGRES_USER: cleanflow
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pgsql, zip, mbstring, json, curl, gd
        tools: phpunit, composer

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Copy environment file
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Update database configuration
      run: |
        sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/g' .env
        sed -i 's/DB_PORT=.*/DB_PORT=5432/g' .env
        sed -i 's/DB_DATABASE=.*/DB_DATABASE=cleanflow_test/g' .env
        sed -i 's/DB_USERNAME=.*/DB_USERNAME=cleanflow/g' .env
        sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/g' .env

    - name: Run migrations
      run: php artisan migrate --force

    - name: Run database seeder
      run: php artisan db:seed --force

    - name: Security audit
      run: composer audit --no-interaction

    - name: Code style check (Pint)
      run: php vendor/bin/pint --test

    - name: Run tests
      run: php vendor/bin/phpunit

    - name: Generate coverage report
      run: php vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
      continue-on-error: true
