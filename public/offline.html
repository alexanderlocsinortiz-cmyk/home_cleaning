<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F6E56">
    <title>Offline | Home Cleaning Service</title>
    <style>
        :root {
            color-scheme: light;
            --bg: linear-gradient(180deg, #f8fafc 0%, #ecfdf5 100%);
            --card: rgba(255, 255, 255, 0.92);
            --border: rgba(15, 110, 86, 0.12);
            --heading: #0f172a;
            --text: #475569;
            --accent: #0f6e56;
            --accent-soft: #d1fae5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .card {
            width: min(100%, 540px);
            border-radius: 28px;
            padding: 32px;
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        h1 {
            margin: 22px 0 12px;
            color: var(--heading);
            font-size: clamp(28px, 5vw, 40px);
            line-height: 1.05;
        }

        p {
            margin: 0 0 18px;
            line-height: 1.7;
            font-size: 16px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 26px;
        }

        a,
        button {
            appearance: none;
            border: 0;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .primary {
            background: var(--accent);
            color: #fff;
        }

        .secondary {
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">Offline Mode</div>
        <h1>Home Cleaning Service is temporarily offline.</h1>
        <p>Your connection looks unavailable right now. Reconnect to continue booking, tracking, and managing services.</p>
        <p>If you installed the app, open it again once your internet is back and the latest pages will load automatically.</p>
        <div class="actions">
            <button class="primary" type="button" onclick="window.location.reload()">Try Again</button>
            <a class="secondary" href="/">Back to Home</a>
        </div>
    </main>
</body>
</html>
