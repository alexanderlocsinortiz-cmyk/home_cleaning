services:
  - type: web
    name: cleanflow-app
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && npm install && npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://cleanflow-app.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          type: postgres
          name: cleanflow-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromService:
          type: postgres
          name: cleanflow-db
          property: database
      - key: DB_USERNAME
        fromService:
          type: postgres
          name: cleanflow-db
          property: user
      - key: DB_PASSWORD
        fromService:
          type: postgres
          name: cleanflow-db
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log

databases:
  - name: cleanflow-db
    databaseName: cleanflow_db
    user: cleanflow_user
